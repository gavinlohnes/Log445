<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Beyond">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#030305">
<meta name="description" content="Project Beyond — personal training, nutrition, and health tracker">
<title>PROJECT BEYOND // LOHNES</title>
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ═══════════════════════════════════════════
   SERVICE WORKER & AUTO-UPDATE
   ═══════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      reg.update();
      reg.onupdatefound = () => {
        const installingWorker = reg.installing;
        installingWorker.onstatechange = () => {
          if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
            window.location.reload();
          }
        };
      };
    }).catch(err => console.warn('// OFFLINE CACHE UNAVAILABLE'));
  });
}

/* ═══════════════════════════════════════════
   WAKE LOCK (KEEP SCREEN ON)
   ═══════════════════════════════════════════ */
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (err) {
      console.error('// WAKE LOCK FAILED');
    }
  }
}
document.addEventListener('click', requestWakeLock, { once: true });
</script>
<style>
:root {
  --bg:       #030305;
  --bg2:      #07070c;
  --panel:    #0b0b12;
  --panel2:   #0f0f18;
  --border:   #1a0a0a;
  --border2:  #2d1010;
  --border3:  #3d1818;
  --text:     #ede0e0;
  --text2:    #c4a0a0;
  --text3:    #a08080;
  --red:      #e01a1a;
  --red2:     #ff2d2d;
  --red-dim:  #e01a1a1a;
  --red-glow: #e01a1a55;
  --gold:     #f0b830;
  --gold-dim: #f0b8301a;
  --green:    #1fdb6a;
  --cyan:     #00c8e0;
  --r: 6px;
  --rl: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
  background-image:
    repeating-linear-gradient(0deg,   transparent, transparent 39px, #ff000008 39px, #ff000008 40px),
    repeating-linear-gradient(90deg,  transparent, transparent 39px, #ff000008 39px, #ff000008 40px);
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, #00000015 2px, #00000015 4px);
  pointer-events: none;
  z-index: 1000;
}
#app { max-width: 720px; margin: 0 auto; padding-bottom: 70px; }
.hdr { padding: 16px 16px 0; display: flex; align-items: flex-start; justify-content: space-between; }
.hdr-logo {
  font-family: 'Orbitron', monospace;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.3em;
  color: var(--red2);
  text-shadow: 0 0 12px var(--red-glow);
  text-transform: uppercase;
}
.sys-status {
  font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--gold);
  letter-spacing: 0.12em; margin-top: 4px; text-transform: uppercase;
}
.accent-bar { height: 2px; background: linear-gradient(90deg, var(--red2), var(--red), transparent); margin: 12px 16px 0; }
.nav { display: flex; overflow-x: auto; padding: 12px 16px 0; scrollbar-width: none; }
.nav-tab {
  flex-shrink: 0; background: none; border: none; font-family: 'Orbitron', monospace;
  font-size: 12px; font-weight: 700; color: var(--text3); letter-spacing: 0.15em;
  text-transform: uppercase; padding: 7px 12px 9px; position: relative;
}
.nav-tab.on { color: var(--red2); text-shadow: 0 0 8px var(--red-glow); }
.nav-tab.on::after { content: ''; position: absolute; bottom: 0; left: 12px; right: 12px; height: 2px; background: var(--red2); }
.nav-line { height: 1px; background: var(--border2); margin: 0 16px; }
.page { display: none; padding: 12px 16px 20px; }
.page.on { display: block; }
.card {
  background: var(--panel); border: 1px solid var(--border2); border-radius: var(--rl);
  padding: 12px 14px; margin-bottom: 10px; position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%;
  background: linear-gradient(180deg, var(--red2), transparent); opacity: 0.6;
}
.clabel {
  font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--red);
  text-shadow: 0 0 8px var(--red-glow); margin-bottom: 10px;
}
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-cell { background: var(--panel2); border: 1px solid var(--border); border-radius: var(--r); padding: 9px 11px; }
.slabel { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--text3); text-transform: uppercase; }
.sval {
  font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700; color: var(--text);
  outline: none; background: none; border: none; width: 100%; margin-top: 2px;
}
.pill-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 6px; }
.pill {
  background: var(--panel2); border: 1px solid var(--border2); border-radius: 4px;
  padding: 9px 4px; font-family: 'Rajdhani', sans-serif; font-size: 11px;
  font-weight: 700; color: var(--text3); cursor: pointer; text-align: center;
}
.pill.on { background: var(--red-dim); border-color: var(--red); color: var(--red2); }
.tmr-btn {
  background: var(--panel2); border: 1px solid var(--border2); border-radius: 5px;
  padding: 4px 10px; font-family: 'Share Tech Mono', monospace; font-size: 11px;
  color: var(--text3); cursor: pointer;
}
#toast {
  position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--border2); border-radius: 3px;
  padding: 8px 16px; font-family: 'Share Tech Mono', monospace; font-size: 12px;
  color: var(--red2); opacity: 0; transition: opacity 0.3s; z-index: 1000;
}
#toast.on { opacity: 1; }
</style>
</head>
<body onclick="requestWakeLock()">

<div id="app">
  <div class="hdr">
    <div style="flex:1;">
      <div class="hdr-logo">PROJECT BEYOND // LOHNES</div>
      <div id="sys-status" class="sys-status">// SYSTEM READY</div>
    </div>
  </div>

  <div class="accent-bar"></div>

  <div class="nav">
    <button class="nav-tab on" onclick="show('daily')">Daily</button>
    <button class="nav-tab" onclick="show('push')">Push</button>
    <button class="nav-tab" onclick="show('pull')">Pull</button>
    <button class="nav-tab" onclick="show('upper')">Upper</button>
    <button class="nav-tab" onclick="show('summary')">Summary</button>
    <button class="nav-tab" onclick="show('history')">History</button>
  </div>
  <div class="nav-line"></div>

  <div id="page-daily" class="page on">
    <div class="stat-grid">
      <div class="stat-cell">
        <div class="slabel">Calories</div>
        <input class="sval" type="number" id="calories" placeholder="0" oninput="saveDaily(this)">
      </div>
      <div class="stat-cell">
        <div class="slabel">Protein</div>
        <input class="sval" type="number" id="protein" placeholder="0" oninput="saveDaily(this)">
      </div>
    </div>
    <div class="stat-grid" style="margin-top:10px;">
      <div class="stat-cell">
        <div class="slabel">Steps</div>
        <input class="sval" type="number" id="steps" placeholder="0" oninput="saveDaily(this)">
      </div>
      <div class="stat-cell">
        <div class="slabel">Weight (lbs)</div>
        <input class="sval" type="number" id="bodyweight" placeholder="0.0" step="0.1" oninput="saveDaily(this)">
      </div>
    </div>

    <div class="card" style="margin-top:10px;">
      <div class="clabel">Fasting Protocol</div>
      <div class="pill-row">
        <button class="tmr-btn" onclick="logMeal()">// JUST ATE</button>
        <div id="fast-timer" style="font-family:'Share Tech Mono'; font-size:14px; text-align:right;">00:00:00</div>
      </div>
    </div>

    <div class="sdiv" style="margin-top:15px; color:var(--text3); font-family:'Share Tech Mono'; font-size:10px;">SHIFT CONTEXT</div>
    <div class="pill-row" style="margin-top:5px;">
      <div class="pill" id="day-off" onclick="setDayType('off')">OFF DUTY</div>
      <div class="pill" id="day-work" onclick="setDayType('work')">ON SHIFT</div>
    </div>
  </div>

  <div id="page-push" class="page"><div class="clabel">Push Protocol</div><div id="push-list"></div></div>
  <div id="page-pull" class="page"><div class="clabel">Pull Protocol</div><div id="pull-list"></div></div>
  <div id="page-upper" class="page"><div class="clabel">Upper Protocol</div><div id="upper-list"></div></div>

  <div id="page-summary" class="page">
    <div class="card"><div class="clabel">Progress Trend</div><canvas id="mainChart"></canvas></div>
  </div>

  <div id="page-history" class="page">
    <button class="tmr-btn" style="width:100%;" onclick="exportCSV()">EXPORT SESSION DATA (CSV)</button>
    <div id="history-list" style="margin-top:15px;"></div>
  </div>
</div>

<div id="toast">// DATA SYNCED</div>

<script>
function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('page-' + id).classList.add('on');
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.remove('on');
    if (t.textContent.toLowerCase() === id) t.classList.add('on');
  });
}

function saveDaily(el) {
  const data = JSON.parse(localStorage.getItem('beyond_daily') || '{}');
  data[el.id] = el.value;
  localStorage.setItem('beyond_daily', JSON.stringify(data));
  toast();
}

function setDayType(type) {
  document.getElementById('day-off').classList.toggle('on', type === 'off');
  document.getElementById('day-work').classList.toggle('on', type === 'work');
  localStorage.setItem('beyond_shift', type);
  toast();
}

function logMeal() {
  const now = new Date().getTime();
  localStorage.setItem('beyond_last_meal', now);
  toast('// MEAL LOGGED');
}

function toast(txt) {
  const t = document.getElementById('toast');
  t.textContent = txt || '// DATA SYNCED';
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2000);
}

window.onload = () => {
  const shift = localStorage.getItem('beyond_shift') || 'off';
  setDayType(shift);
  const daily = JSON.parse(localStorage.getItem('beyond_daily') || '{}');
  Object.keys(daily).forEach(key => {
    const el = document.getElementById(key);
    if(el) el.value = daily[key];
  });
};
</script>
</body>
</html>
